<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simon Says Game</title>
    <link rel="stylesheet" href="./output.css">
    <link rel="icon" href="./icon.png" type="image/x-icon">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Stencil:opsz,wght@10..72,100..900&family=Bungee&family=Monoton&display=swap" rel="stylesheet">
  </head>
  <body class="font-serif transition ease-in-out">
    <div class="h-screen w-screen flex justify-center items-center">
      <div class="h-screen w-fit flex flex-col items-center pt-8">
        <h1><pre class="text-center font-[Monoton] max-sm:text-3xl max-md:text-4xl max-lg:text-5xl lg:text-5xl">SIMON    SAYS    GAME</pre></h1>
        <p class="text-center font-bold mt-20 md:mt-8 mb-4 font-BigShouldersStencil max-sm:text-2xl max-md:text-3xl max-lg:text-4xl lg:text-4xl">Press anywhere to start the game</p>
        <div class="min-h-80 w-80 p-2 grid grid-cols-2 grid-rows-2 gap-2 border-2 rounded-3xl border-gray-400 bg-white *:border-2 *:rounded-2xl *:border-gray-400 *:transition *:ease-in-out">
          <div id="red" class="red btn"></div>
          <div id="blue" class="blue btn"></div>
          <div id="yellow" class="yellow btn"></div>
          <div id="green" class="green btn"></div>
        </div>
        <p id="maxScore" class="text-center mt-10 font-[Bungee] max-sm:text-2xl max-md:text-3xl max-lg:text-4xl lg:text-4xl">--- Highest Score ---</p>
      </div>
    </div>
    
    <!-- Js file -->
    <script src="./app.js"></script>
  </body>
</html>
